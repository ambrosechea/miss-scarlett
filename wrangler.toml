name = "miss-scarlett"
main = "worker/index.ts"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "missscarlett.com.au"
custom_domain = true

[[routes]]
pattern = "www.missscarlett.com.au"
custom_domain = true

[build]
command = "npm run build"

# Serve the Vite-built SPA from dist/
# not_found_handling = "single-page-application" handles React Router deep links
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Only invoke the Worker for navigation/API requests; fingerprinted static
# assets (JS/CSS/images/fonts, all under /assets/*) are served directly by
# the platform without a Worker invocation.
run_worker_first = ["/*", "!/assets/*"]

# D1 database — run `npm run db:create` to create it on Cloudflare,
# then replace database_id below with the ID printed by that command.
[[d1_databases]]
binding = "DB"
database_name = "miss-scarlett"
database_id = "d649ef9c-b841-484a-af71-71c83e13d3c3"

# Email Sending — requires `wrangler email sending enable missscarlett.com.au`
[[send_email]]
name = "EMAIL"
allowed_destination_addresses = ["support@missscarlett.com.au", "ambrose@locally.net.au"]

[observability]
enabled = true

[dev]
port = 8787
local_protocol = "http"
